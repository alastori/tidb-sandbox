global
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3
    option  redispatch

# Stats page at http://localhost:8404/stats
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s

# SQL proxy front-end — the stable endpoint apps connect to
frontend sql_proxy
    bind *:6001
    default_backend tidb_backends

# Backend pool: tidb-1 primary, tidb-2 backup
# Switchover: stop tidb-1 container → HAProxy fails over to tidb-2
backend tidb_backends
    balance roundrobin
    option mysql-check user root
    server tidb-1 tidb-1:4000 check inter 2s fall 2 rise 1
    server tidb-2 tidb-2:4000 check inter 2s fall 2 rise 1 backup
