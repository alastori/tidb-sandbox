global
    log stdout format raw local0
    maxconn 256

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 1

frontend mysql_front
    bind *:6001
    default_backend tidb_back

backend tidb_back
    balance roundrobin
    # Active backend — switched by restarting HAProxy with updated config
    server tidb-1 tidb-1:4000 check inter 2s fall 2 rise 1
    server tidb-2 tidb-2:4000 check inter 2s fall 2 rise 1 backup
