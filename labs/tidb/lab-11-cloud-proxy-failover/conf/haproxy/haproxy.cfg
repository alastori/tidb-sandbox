global
    log stdout format raw local0
    maxconn 256

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 10s
    timeout client  60s
    timeout server  60s

frontend mysql_front
    bind *:6001
    default_backend tidb_back

backend tidb_back
    balance roundrobin
    # PLACEHOLDER — replaced by scripts with real cloud endpoint
    server backend1 DEDICATED_HOST:4000
