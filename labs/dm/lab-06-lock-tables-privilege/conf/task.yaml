name: "lock-tables-test"
task-mode: "all"

# Cloud DM uses consistency=flush (not auto/snapshot).
# This requires LOCK TABLES on the source.
mydumpers:
  global:
    extra-args: "--consistency flush"

target-database:
  host: "tidb"
  port: 4000
  user: "root"
  password: ""

mysql-instances:
  - source-id: "mysql-source"
    block-allow-list: "allow-testdb"
    mydumper-config-name: "global"

block-allow-list:
  allow-testdb:
    do-dbs: ["testdb"]
