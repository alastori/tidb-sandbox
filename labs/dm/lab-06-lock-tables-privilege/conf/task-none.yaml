name: "lock-tables-test"
task-mode: "all"

# consistency=none — no locking, no consistent snapshot.
# Should succeed without LOCK TABLES privilege.
mydumpers:
  global:
    extra-args: "--consistency none"

target-database:
  host: "tidb"
  port: 4000
  user: "root"
  password: ""

mysql-instances:
  - source-id: "mysql-source"
    block-allow-list: "allow-testdb"
    mydumper-config-name: "global"

block-allow-list:
  allow-testdb:
    do-dbs: ["testdb"]
