name: fk-v856
task-mode: "all"

target-database:
  host: "tidb"
  port: 4000
  user: "root"
  password: ""
  session:
    foreign_key_checks: "ON"

mysql-instances:
  - source-id: "mysql-src"
    block-allow-list: "partial-tables"
    syncer-config-name: "multi-filtered"

block-allow-list:
  partial-tables:
    # do-dbs intentionally omitted: when do-dbs is set, skipByTable considers
    # any table in a matching database as "not filtered", even if do-tables
    # excludes it. Using only do-tables ensures parent is detected as filtered.
    do-tables:
      - db-name: "fk_lab"
        tbl-name: "child_cascade"
      # parent table deliberately excluded to test the BAL missing ancestor error

syncers:
  multi-filtered:
    safe-mode: false
    worker-count: 4
